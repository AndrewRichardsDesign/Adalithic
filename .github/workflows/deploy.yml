name: Deploy to GitHub Pages

# Builds the Vite app and deploys the result to GitHub Pages on every push to
# main, so editing the React source is enough — no manual `vite build` and
# copy-to-root step required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx vite build
      # Preserve the custom domain, disable Jekyll processing, and add the SPA
      # fallback. GitHub Pages has no server-side routing, so a direct hit on a
      # client-only route (e.g. /terms, /privacy — the URLs the Arcatext app and
      # the footer link to) would 404. Serving a copy of index.html as 404.html
      # lets GitHub return the app for any unknown path; wouter then renders the
      # right page client-side. The relative asset base (vite `base: "./"`) plus
      # single-segment routes keep ./script.js resolving correctly.
      - name: Add CNAME, .nojekyll, and SPA 404 fallback
        run: |
          echo "adalithic.com" > dist/public/CNAME
          touch dist/public/.nojekyll
          cp dist/public/index.html dist/public/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
