name: Deploy to GitHub Pages

# Builds the Vite app and deploys the result to GitHub Pages on every push to
# main, so editing the React source is enough — no manual `vite build` and
# copy-to-root step required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx vite build
      # Preserve the custom domain, disable Jekyll processing, and add SPA
      # fallbacks. GitHub Pages has no server-side routing, so a direct hit on a
      # client-only route (e.g. /terms, /privacy — the URLs the Arcatext app and
      # the footer link to) would otherwise 404.
      #
      # Two layers:
      # 1. Real terms.html / privacy.html (and per-locale copies) so GitHub Pages
      #    serves /terms, /privacy, /es/privacy, ... as true HTTP 200s (important:
      #    these URLs are linked from the app and submitted to the App Store /
      #    Google Play, which can flag a 404-status URL). Assets load via the
      #    absolute vite `base: "/"`, so a copy of index.html works at any depth.
      # 2. 404.html as a catch-all for any other client route (renders the app
      #    with a 404 status; browsers still route it correctly).
      #
      # LOCALES must stay in sync with PREFIX_LOCALES in client/src/lib/locale.ts.
      - name: Add CNAME, .nojekyll, and SPA fallbacks
        run: |
          echo "adalithic.com" > dist/public/CNAME
          touch dist/public/.nojekyll
          cp dist/public/index.html dist/public/404.html
          cp dist/public/index.html dist/public/terms.html
          cp dist/public/index.html dist/public/privacy.html
          for L in es fr de ja it pl nl pt zh ko tr el ar he sv cs ro hu; do
            mkdir -p "dist/public/$L"
            cp dist/public/index.html "dist/public/$L/index.html"
            cp dist/public/index.html "dist/public/$L/privacy.html"
            cp dist/public/index.html "dist/public/$L/terms.html"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
